<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#050a05"/>
  <!-- Outer glow border -->
  <rect x="1.5" y="1.5" width="29" height="29" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.5"/>
  <!-- Inner subtle border -->
  <rect x="3" y="3" width="26" height="26" fill="none" stroke="#4ade80" stroke-width="0.5" opacity="0.2"/>
  <!-- Scanline effect (subtle horizontal lines) -->
  <line x1="0" y1="8" x2="32" y2="8" stroke="#4ade80" stroke-width="0.3" opacity="0.07"/>
  <line x1="0" y1="16" x2="32" y2="16" stroke="#4ade80" stroke-width="0.3" opacity="0.07"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="#4ade80" stroke-width="0.3" opacity="0.07"/>
  <!-- >_ prompt -->
  <text x="5" y="21" font-family="monospace,Courier New" font-size="14" font-weight="bold" fill="#4ade80">&gt;_</text>
  <!-- Glow layer (same text, blurred) -->
  <text x="5" y="21" font-family="monospace,Courier New" font-size="14" font-weight="bold" fill="#4ade80" opacity="0.4" filter="url(#glow)">&gt;_</text>
  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
    </filter>
  </defs>
</svg>
